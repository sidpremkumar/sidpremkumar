name: contribution-skyline

on:
  schedule:
    - cron: "17 5 * * *"      # daily at 05:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render contribution skyline (stdlib only)
        run: python3 .github/scripts/skyline_gen.py "${{ github.repository_owner }}" skyline.svg

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skyline.svg
          git diff --quiet --staged || git commit -m "chore: refresh contribution skyline"
          git push
